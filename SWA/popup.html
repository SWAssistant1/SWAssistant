<html>

<head>
  <meta charset="UTF-8">
  <style>
    button {
      height: 30px;
      outline: none;
    }

    .container {
      width: 300px;
    }
  </style>
  <link rel="stylesheet" type="text/css" href="./styles.css">
</head>

<body>
  <div class="container">
    <div class="branch-config" style="margin-bottom:10px;">
      <label for="swaBranch" style="display:block; margin-bottom:4px;">Branch (testowanie):</label>
      <input type="text" id="swaBranch" placeholder="main" style="width:100%; box-sizing:border-box;" />
    </div>
    <label class="switch"><input type="checkbox" id="characterTraining" data-automation="characterTraining"><span class="slider">Trening postaci</span></label>
    <label class="switch"><input type="checkbox" id="respawn" data-automation="respawn"><span class="slider">Respawn</span></label>
    <label class="switch"><input type="checkbox" id="exp" data-automation="exp"><span class="slider">Exp</span></label>
    <label class="switch"><input type="checkbox" id="wars" data-automation="wars"><span class="slider">Wojny</span></label>
    <label class="switch"><input type="checkbox" id="insta30" data-automation="insta30"><span class="slider">Insta 30</span></label>
    <label class="switch"><input type="checkbox" id="missions" data-automation="missions"><span class="slider">Misje</span></label>
    <label class="switch"><input type="checkbox" id="automation7" data-automation="automation7"><span class="slider">Automatyzacja 7</span></label>
    <label class="switch"><input type="checkbox" id="automation8" data-automation="automation8"><span class="slider">Automatyzacja 8</span></label>
    <label class="switch"><input type="checkbox" id="automation9" data-automation="automation9"><span class="slider">Automatyzacja 9</span></label>
    <label class="switch"><input type="checkbox" id="automation10" data-automation="automation10"><span class="slider">Automatyzacja 10</span></label>
  </div>
  <script src="main.js"></script>
</body>

</html>

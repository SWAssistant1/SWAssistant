name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      # - run: npm run lint

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: swassistant-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.snap
            dist/*.exe
          if-no-files-found: ignore
